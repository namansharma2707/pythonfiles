<!DOCTYPE html>
<html>
<head>
    <title>Local GPT</title>

    <style>
        body{
            font-family: Arial;
            margin:0;
            height:100vh;
            display:flex;
            flex-direction:column;
        }

        #chat{
            flex:1;
            overflow-y:auto;
            padding:20px;
        }

        .user{
            text-align:right;
            margin:10px;
        }

        .bot{
            text-align:left;
            margin:10px;
        }

        #bottom{
            display:flex;
            padding:10px;
            border-top:1px solid #ccc;
        }

        input{
            flex:1;
            padding:10px;
        }

        button{
            padding:10px 20px;
        }
        #model{
            width:90px ;

        }
    </style>
</head>
<body>

<div id="chat"></div>

<div id="bottom">
    <input id="prompt" placeholder="Type message...">
    <select id="model"></select>
    <button onclick="sendMessage()">Send</button>
</div>

<script>

    fetch("/models")
.then(r=>r.json())
.then(data=>{

    let select=document.getElementById("model");

    data.models.forEach(m=>{

        let option=document.createElement("option");

        option.value=m.name;
        option.text=m.name;

        select.appendChild(option);

    });

});

async function sendMessage(){

    let input = document.getElementById("prompt");
    let prompt = input.value;
    let model = document.getElementById("model").value;
    if(!prompt) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="user">
            <b>You:</b> ${prompt}
        </div>
    `;

    input.value = "";

    let response = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            prompt:prompt,
            model:model
        })
    });

    let data = await response.json();

    chat.innerHTML += `
        <div class="bot">
            <b>${model}:</b> <br>
            ${data.response}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
